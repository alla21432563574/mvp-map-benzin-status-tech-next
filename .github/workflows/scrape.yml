name: Update fuel stations across Russia

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: benzin-status-russia-scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Scrape all of Russia
        run: pnpm scrape:benzin -- --once
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCRAPER_ENABLED: "true"
          SCRAPER_MODE: russia
          SCRAPER_CITY: Россия
          SCRAPER_GRID_STEP_DEGREES: "4"
          SCRAPER_MAX_STATIONS_PER_RUN: "5000"
          SCRAPER_REQUEST_DELAY_MS: "250"
          SCRAPER_REPORT_LOOKBACK_HOURS: "2"
          SCRAPER_MAX_REPORT_STATIONS: "2000"
          SCRAPER_LOCK_SECONDS: "3600"
          SCRAPER_MIN_SNAPSHOT_RATIO: "0.85"
          SCRAPER_MISSING_RUNS_BEFORE_DEACTIVATE: "3"
          SCRAPE_LOG_RETENTION_DAYS: "30"
